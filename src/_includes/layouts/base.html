<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>

  <link rel="stylesheet" href="/public/css/main.css">
  <link rel="stylesheet" href="/public/css/product.css">
  <script src="/public/js/chart.js" defer></script>
  <script src="/public/js/fetch.js" defer></script>
  <script src="/public/js/make.js" defer></script>
  <script src="/public/js/worker.js" defer></script>
  <script src="/public/js/grid.js" defer></script>
  <script src="/public/js/corepress.js" defer></script>
  <script src="/public/js/search.js" defer></script>
</head>
<body>

  <header id="header" itemscope itemtype="https://schema.org/WPHeader">
    <div class="header-main-row">
      <div class="header-container">
        <div class="logo" id="logo-wrap"></div>
        <div class="search-container" id="search-wrap"></div>
        <div class="header-actions" id="actions-wrap"></div>
      </div>
    </div>
    <nav id="widget-topbar"></nav>
  </header>


  <div id="primary">
    <article id="single-content">
      <div id="post-body">
        <hr class="clean-divider">
          {{ content }}
      </div>
      <hr class="clean-divider">
      <div class="share-box-wrap">
        <button id="shareOpenBtn" class="main-share-button">مشاركة مع الاصدقاء</button>
      </div>
      <hr class="clean-divider">
      <p>عروض ستعجبك</p>
      <div id="souq-widget-root"></div>
    </article>
  </div>


<footer id='footer' itemscope='itemscope' itemtype='https://schema.org/WPFooter'> 
  <div class='footer-container'>
    <div class='footer-row'>
      
      <div class='footer-links'>
        <h3 class='footer-title'>عن الموقع</h3>
        <ul>
          <li><a href='/pages/info/about-us/'>من نحن</a></li>
          <li><a href='/pages/info/policy/'>سياسة الموقع</a></li>
          <li><a href='/pages/info/contact/'>اتصل بنا</a></li>
        </ul>
      </div>
      
      <div class='footer-links'>
        <h3 class='footer-title'>اعرف أكثر</h3>
        <ul>
          <li><a href='/pages/main/blog/'>المدونة</a></li>
          <li><a href='/pages/services/iseekchat/'>دردشة</a></li>
        </ul>
      </div>


      <div class='footer-social-section'>
        <h3 class='footer-title'>تابعونا علي</h3>
        <div class='footer-social'>
          <a aria-label='YouTube' href='https://www.youtube.com/@ISeekPrice' rel='noopener' target='_blank'>
            <svg class='icon'><use href='/public/assets/static/icons.svg#i-youtube'/></svg>
          </a>
          <a aria-label='Pinterest' href='https://www.pinterest.com/ISeekPrice' rel='noopener' target='_blank'>
            <svg class='icon'><use href='/public/assets/static/icons.svg#i-pinterest'/></svg>
          </a>
          <a aria-label='Facebook' href='https://www.facebook.com/profile.php?id=61579522981793' rel='noopener' target='_blank'>
            <svg class='icon'><use href='/public/assets/static/icons.svg#i-facebook'/></svg>
          </a>
          <a aria-label='Instagram' href='https://www.instagram.com/iseekprice/' rel='noopener' target='_blank'>
            <svg class='icon'><use href='/public/assets/static/icons.svg#i-instagram'/></svg>
          </a>
          <a aria-label='X' href='https://x.com/ISeekPrice' rel='noopener' target='_blank'>
            <svg class='icon'><use href='/public/assets/static/icons.svg#i-x'/></svg>
          </a>
          <a aria-label='Telegram' href='https://t.me/+bmBnY0FumOwxZDQ0' rel='noopener' target='_blank'>
            <svg class='icon'><use href='/public/assets/static/icons.svg#i-telegram'/></svg>
          </a>
        </div>
      </div>
    </div>
  </div>
  <div class='footer-bottom'>
    <p>© 2024-2026 جميع الحقوق محفوظة لموقع iseekprice.com</p>
  </div>
</footer>


  <div id="widget-sidebar"></div>
  <div id="widget-overlay"></div>

</body>
</html>
