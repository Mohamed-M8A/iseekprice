<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سلة التسوق</title>
  <style>
    
:root{--bg:#f0f2f5;--card:#fff;--text:#111;--muted:#888;--accent:#000;--success:#27ae60;--danger:#e74c3c;--sh:0 4px 12px rgba(0,0,0,0.05)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{background:var(--bg);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:0;color:var(--text)}#cart-page-wrapper{max-width:650px;margin:0 auto;padding:20px 15px 100px}.cart-item{display:flex;background:var(--card);padding:20px;margin-bottom:18px;border-radius:28px;box-shadow:var(--sh);position:relative;flex-direction:column;gap:15px}.item-main-row{display:flex;flex-direction:row;align-items:center;gap:18px}.item-img-link{width:120px;height:120px;background:#f9f9f9;border-radius:22px;overflow:hidden;flex-shrink:0;position:relative;order:1;border:1px solid #f0f0f0}.item-img-link img{width:100%;height:100%;object-fit:contain}.item-info{flex:1;order:2;text-align:right}.item-title{font-size:16px;font-weight:700;margin:0 0 10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.item-price-row{display:flex;align-items:center;justify-content:flex-start;gap:12px}.price-now{font-size:20px;font-weight:800;color:var(--success)}.price-before{font-size:14px;color:var(--muted);text-decoration:line-through}.shipping-tag{font-size:12px;color:#666;margin-top:8px;display:block}.item-btns{display:flex;width:100%}.btn-action{flex:1;padding:16px;border-radius:18px;font-size:15px;font-weight:700;text-decoration:none;text-align:center;transition:.2s;background:var(--accent);color:#fff}.btn-action:active{transform:scale(0.98);opacity:0.9}.remove-item-btn{position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.9);border:1px solid #eee;width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;font-size:16px;z-index:2}.cart-summary{background:var(--accent);color:#fff;padding:28px;border-radius:32px;margin-top:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2)}.summary-line{display:flex;justify-content:space-between;flex-direction:row-reverse;margin-bottom:12px;font-size:15px;opacity:.9}.summary-line.grand-total{margin-top:18px;padding-top:18px;border-top:1px dashed rgba(255,255,255,0.2);opacity:1;font-size:24px;font-weight:800}#savings-container{text-align:left}.total-savings{display:inline-block;background:#1e3a2b;color:#58d68d;padding:8px 18px;border-radius:50px;font-size:13px;margin-top:12px}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}.modal-content{background:#fff;padding:30px;border-radius:30px;width:100%;max-width:340px;text-align:center}.dark-mode .cart-item{background:linear-gradient(135deg,#1a1a1a 0%,#131313 100%);border:1px solid #2c2c2c;box-shadow:0 6px 18px rgb(0 0 0 / .4)}.dark-mode .remove-item-btn{background:#2c2c2c;border-color:#555;color:#fff}.dark-mode .remove-item-btn:hover{background:#fff;color:#000}.dark-mode .item-img-link{background:#2a2a2a;border-color:#444}.dark-mode .item-title{color:#fff}.dark-mode .price-before,.dark-mode .shipping-tag{color:#a1a1a1}
    
</style>
</head>

<body>
  <div id="cart-page-wrapper">
    <div id="cart-items">
      <p style="text-align: center; padding: 40px; color: #888;">جاري تحميل محتويات سلتك...</p>
    </div>

    <div class="cart-summary">
      <div class="summary-line">
        <span id="product-count-val">0</span>
        <span>عدد المنتجات:</span>
      </div>
      <div class="summary-line">
        <span id="subtotal-val">0.00</span>
        <span>المجموع الفرعي:</span>
      </div>
      <div class="summary-line">
        <span id="shipping-val">0.00</span>
        <span>رسوم الشحن:</span>
      </div>
      <div class="summary-line grand-total">
        <span id="total-price">0.00</span>
        <span>الإجمالي المستحق:</span>
      </div>
      <div style="text-align: left;" id="savings-container"></div>
    </div>

    <div style="text-align: center; margin-top: 25px;">
        <button onclick="handleDialog('clear')" style="background:none; border:none; color:#999; cursor:pointer; font-size:13px; text-decoration:underline;">إفراغ العربة بالكامل</button>
    </div>
  </div>

  <div id="confirm-dialog" class="modal-overlay">
    <div class="modal-content">
      <p id="confirm-message" style="font-weight:700; font-size: 18px;"></p>
      <div style="display:flex; gap:12px; margin-top:25px;">
        <button onclick="confirmAction(true)" style="flex:1; padding:15px; border-radius:15px; border:none; background:#000; color:#fff; font-weight:700; cursor:pointer;">تأكيد</button>
        <button onclick="confirmAction(false)" style="flex:1; padding:15px; border-radius:15px; border:none; background:#f0f2f5; color:#555; font-weight:700; cursor:pointer;">إلغاء</button>
      </div>
    </div>
  </div>

<script>
  
(function() {
    const CONFIG = {
        BASE_URL: "https://api.iseekprice.com/",
        DOMAIN: "https://www.iseekprice.com/",
        IMAGE_DOMAIN: "https://media.iseekprice.com/",
        PLACEHOLDER: "/public/assets/static/Save.jpg"
    };

    const currencySymbols = { SA: "ر.س", AE: "د.إ", OM: "ر.ع", MA: "د.م", DZ: "د.ج", TN: "د.ت" };
    const country = (localStorage.getItem("Cntry") || "SA").toUpperCase();
    const symbol = currencySymbols[country] || "ر.س";

    let currentTask = { type: null, id: null };

    function getDatePath(offset) {
        const d = new Date(Date.UTC(2025, 0, 1) + (offset * 86400000));
        const y = d.getUTCFullYear();
        const m = String(d.getUTCMonth() + 1).padStart(2, '0');
        const day = String(d.getUTCDate()).padStart(2, '0');
        return `${y}/${m}/${day}`;
    }

    async function initCart() {
        const itemsContainer = document.getElementById("cart-items");
        const cartData = JSON.parse(localStorage.getItem("cart")) || [];

        if (cartData.length === 0) {
            itemsContainer.innerHTML = `<div style="text-align:center;padding:60px;color:#aaa;font-size:18px;">السلة فارغة حالياً</div>`;
            updateTotals(0, 0, 0, 0);
            return;
        }

        const cartIds = new Set(cartData.map(item => BigInt(item.id || 0)));

        try {
            const v = Date.now();
            const mapRes = await fetch(`${CONFIG.BASE_URL}General/map.json?v=${v}`);
            const fileMap = await mapRes.json();

            const coreFile = `General/core_${fileMap.core}.bin`;
            const feedHash = fileMap.regions[country]?.feed;
            const feedFile = `${country}/feed_${feedHash}.bin`;

            const [coreRes, feedRes] = await Promise.all([
                fetch(`${CONFIG.BASE_URL}${coreFile}?v=${v}`),
                fetch(`${CONFIG.BASE_URL}${feedFile}?v=${v}`)
            ]);

            const coreBuf = await coreRes.arrayBuffer();
            const feedBuf = await feedRes.arrayBuffer();
            const coreView = new DataView(coreBuf);
            const feedView = new DataView(feedBuf);
            const decoder = new TextDecoder();
            
            let html = "";
            let subtotal = 0, shippingTotal = 0, originalTotal = 0, count = 0;

            const feedMap = new Map();
            for (let i = 0; i < feedBuf.byteLength; i += 32) {
                feedMap.set(feedView.getBigUint64(i, true), {
                    price: feedView.getUint32(i + 16, true) / 100,
                    original: feedView.getUint32(i + 12, true) / 100,
                    shipping: feedView.getUint32(i + 20, true) / 100,
                    delivery: `${feedView.getUint8(i + 29)}-${feedView.getUint8(i + 30)} يوم`
                });
            }

            for (let i = 0; i < coreBuf.byteLength; i += 276) {
                const id = coreView.getBigUint64(i, true);
                if (cartIds.has(id)) {
                    const f = feedMap.get(id) || { price: 0, original: 0, shipping: 0, delivery: "قريباً" };
                    
                    const dateOffset = coreView.getUint32(i + 8, true);
                    const slug = decoder.decode(new Uint8Array(coreBuf, i + 12, 64)).replace(/\0/g, '').trim();
                    const title = decoder.decode(new Uint8Array(coreBuf, i + 76, 200)).replace(/\0/g, '').trim();
                    
                    const datePath = getDatePath(dateOffset);
                    const img = `${CONFIG.IMAGE_DOMAIN}${datePath}/${id}_1.webp`;
                    const postUrl = `${CONFIG.DOMAIN}product/${slug}/`;

                    subtotal += f.price;
                    shippingTotal += f.shipping;
                    originalTotal += (f.original || f.price);
                    count++;

                    html += `
                        <div class="cart-item" data-id="${id}">
                            <button class="remove-item-btn" onclick="cartManager.handleDialog('remove', '${id}')">×</button>
                            <div class="item-main-row">
                                <a href="${postUrl}" class="item-img-link"><img src="${img}" onerror="this.src='${CONFIG.PLACEHOLDER}'"></a>
                                <div class="item-info">
                                    <h3 class="item-title">${title}</h3>
                                    <div class="item-price-row">
                                        <span class="price-now">${f.price.toFixed(2)} ${symbol}</span>
                                        ${f.original > f.price ? `<span class="price-before">${f.original.toFixed(2)} ${symbol}</span>` : ''}
                                    </div>
                                    <span class="shipping-tag">🚚 التوصيل: ${f.delivery} (${f.shipping === 0 ? 'شحن مجاني' : f.shipping.toFixed(2) + ' ' + symbol})</span>
                                </div>
                            </div>
                            <div class="item-btns">
                                <a href="${postUrl}" class="btn-action" target="_blank" rel="noopener" style="width:100%; text-align:center;">عرض التفاصيل وإتمام الشراء</a>
                            </div>
                        </div>`;
                }
            }

            itemsContainer.innerHTML = html;
            updateTotals(subtotal, shippingTotal, originalTotal, count);

        } catch (err) {
            itemsContainer.innerHTML = `<div style="text-align:center;padding:60px;color:red;">فشل في تحميل السلة.</div>`;
        }
    }

    function updateTotals(sub, ship, old, count) {
        const productCountEl = document.getElementById("product-count-val");
        const subtotalEl = document.getElementById("subtotal-val");
        const shippingEl = document.getElementById("shipping-val");
        const totalPriceEl = document.getElementById("total-price");
        
        if (productCountEl) productCountEl.textContent = count;
        if (subtotalEl) subtotalEl.textContent = `${sub.toFixed(2)} ${symbol}`;
        if (shippingEl) shippingEl.textContent = `${ship.toFixed(2)} ${symbol}`;
        if (totalPriceEl) totalPriceEl.textContent = `${(sub + ship).toFixed(2)} ${symbol}`;
        
        const diff = old - sub;
        const savingsContainer = document.getElementById("savings-container");
        if (savingsContainer) savingsContainer.innerHTML = diff > 0 ? `<span class="total-savings">وفرت ${diff.toFixed(2)} ${symbol}</span>` : "";
    }

    window.cartManager = {
        handleDialog: function(type, id = null) {
            currentTask = { type, id };
            const msgRemove = "\u062d\u0630\u0641 \u0627\u0644\u0645\u0646\u062a\u062c\u061f";
            const msgEmpty = "\u0625\u0641\u0631\u0627\u063a \u0627\u0644\u0633\u0644\u0629\u061f";
            document.getElementById("confirm-message").textContent = type === 'remove' ? msgRemove : msgEmpty;
            document.getElementById("confirm-dialog").style.display = "flex";
        },
        confirmAction: function(proceed) {
            document.getElementById("confirm-dialog").style.display = "none";
            if (!proceed) return;
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            if (currentTask.type === 'remove') {
                cart = cart.filter(item => String(item.id) !== String(currentTask.id));
            } else { cart = []; }
            localStorage.setItem("cart", JSON.stringify(cart));
            initCart();
        }
    };

    window.confirmAction = window.cartManager.confirmAction;
    window.handleDialog = window.cartManager.handleDialog;
    document.addEventListener("DOMContentLoaded", initCart);
})();
  
</script>
  
</body>  
</html>
