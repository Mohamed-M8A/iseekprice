<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href='/public/css/main.css' rel='stylesheet'/> 
<link href='/public/css/product.css' rel='stylesheet'/> 
<script defer src='/public/js/worker.js'></script>  
<script defer src='/public/js/grid.js'></script>  
<script defer src='/public/js/corepress.js'></script>    
<script defer src='/public/js/search.js'></script>
<script defer src='/public/js/chart.js'></script>  
    <title>المتجر - عرض المنتجات</title>
</head>
<body>

    <div id="seller-bar">
        <div class="bar">
            <img id="store-logo" src="/public/assets/static/Store.webp" class="profile-image" alt="Store Logo">
            
            <div class="text" id="store-title">جاري تحميل المتجر...</div>

            <div class="store-stats" id="analytic-stats" style="display:none;">
                <div class="stat-item">
                    <span class="stat-label">المنتجات</span>
                    <span class="stat-value" id="stat-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">التقييم</span>
                    <span class="stat-value" id="stat-rating">0.0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">المبيعات</span>
                    <span class="stat-value" id="stat-sales">0</span>
                </div>
            </div>

            <div class="buttons">
                <a href="#" class="button" id="store-follow-btn">متابعة المتجر</a>
            </div>
        </div>
    </div>

    <div id="souq-widget-root"></div>

    <script>
        async function initStorePage() {
            const params = new URLSearchParams(window.location.search);
            const storeId = params.get('store');
            
            if (storeId) {
                const cached = localStorage.getItem(`store_${storeId}`);
                if (cached) {
                    const data = JSON.parse(cached);
                    document.getElementById('store-title').innerText = data.name;
                    document.getElementById('store-follow-btn').href = `https://s.click.aliexpress.com/${data.aff}`;
                } else {
                    document.getElementById('store-title').innerText = `متجر رقم #${storeId}`;
                }

                if (typeof startWidget === "function") {
                    startWidget();
                    window.addEventListener('message', function(e) {
                        if (e.data && e.data.type === 'DONE') {
                            calculateAnalytics(e.data.core, e.data.feed);
                        }
                    });
                }
            }
        }

        function calculateAnalytics(core, feedMap) {
            if (!core || !feedMap) return;
            
            const productsCount = core.length;
            let totalSales = 0;
            let totalScore = 0;
            let ratedItems = 0;

            core.forEach(p => {
                const feed = (feedMap instanceof Map) ? feedMap.get(p.id) : feedMap[p.id];
                if (feed) {
                    totalSales += (Number(feed.orders) || 0);
                    if (feed.score > 0) {
                        totalScore += Number(feed.score);
                        ratedItems++;
                    }
                }
            });

            const avgScore = ratedItems > 0 ? (totalScore / ratedItems).toFixed(1) : "5.0";

            document.getElementById('stat-count').innerText = productsCount;
            document.getElementById('stat-rating').innerText = avgScore;
            document.getElementById('stat-sales').innerText = totalSales.toLocaleString();
            
            document.getElementById('analytic-stats').style.display = 'flex';
        }

        window.addEventListener('load', initStorePage);
    </script>
</body>
</html>
