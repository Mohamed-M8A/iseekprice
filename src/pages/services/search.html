<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البحث</title>
    <link rel="icon" type="image/x-icon" href="https://www.iseekprice.com/public/assets/static/favicon.ico">
    <link href='/public/css/style.min.css' rel='stylesheet'/> 
</head>
<body>

<header id='header' itemscope='itemscope' itemtype='https://schema.org/WPHeader'>
  <div class='header-main-row'>
    <div class='header-container'>
      <div class='logo' id='logo-wrap'></div>
      <div class='search-container' id='search-wrap'></div>
      <div class='header-actions' id='actions-wrap'></div>
    </div>
  </div>
<nav id='widget-topbar'></nav>
</header>

<div id='widget-sidebar'></div>
<div id='widget-overlay'></div>
    
<h2 class="main-headline" id="query-heading">جاري البحث...</h2>
<main id="souq-widget-root"></main>

<footer id='footer' itemscope='itemscope' itemtype='https://schema.org/WPFooter'>
</footer>
    
<script defer src='/public/js/worker.js'></script>  
<script defer src='/public/js/grid.js'></script>  
<script defer src='/public/js/corepress.js'></script>    
<script defer src='/public/js/search.js'></script>
    
<script>
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get("query")?.trim() || "";
    const heading = document.getElementById("query-heading");

    if (query) {
        heading.innerHTML = `نتائج البحث عن: <span style="color:var(--accent)">"${query}"</span>`;
    } else {
        heading.innerText = "أحدث المنتجات";
        return;
    }

    function getVariants(text) {
        let allVariants = new Set();
        let words = text.toLowerCase().split(/\s+/).filter(w => w.length > 1);

        const normalize = (t) => {
            return t.replace(/[أإآ]/g, "ا")
                    .replace(/[\u064B-\u0652]/g, "")
                    .replace(/ـ/g, "");
        };

        const translit = (t) => {
            const map = {
                'a':'ا','b':'ب','t':'ت','s':'س','j':'ج','h':'ح','x':'خ','d':'د',
                'r':'ر','z':'ز','c':'ص','f':'ف','q':'ق','k':'ك','l':'ل','m':'م',
                'n':'ن','e':'ي','i':'ي','o':'و','u':'و','v':'ف','p':'ب','y':'ي','g':'ج','w':'و'
            };
            return t.split('').map(c => map[c] || c).join('');
        };

        words.forEach(word => {
            let currentSet = new Set();
            let n = normalize(word);
            currentSet.add(n);

            if (/[a-z]/i.test(n)) {
                currentSet.add(normalize(translit(n)));
            }

            let tempArr = Array.from(currentSet);
            tempArr.forEach(v => {
                if (v.startsWith("ال")) currentSet.add(v.substring(2));
                else currentSet.add("ال" + v);
            });

            tempArr = Array.from(currentSet);
            tempArr.forEach(v => {
                if (v.endsWith("ة")) currentSet.add(v.slice(0, -1) + "ه");
                if (v.endsWith("ه")) currentSet.add(v.slice(0, -1) + "ة");
            });

            tempArr = Array.from(currentSet);
            tempArr.forEach(v => {
                currentSet.add(v.replace(/(ات|ون|ين)$/, ""));
            });

            currentSet.forEach(v => {
                if (v.length > 2) allVariants.add(v);
            });
        });

        return Array.from(allVariants);
    }

    window.searchVariants = getVariants(query);
    console.log("Final Query Tokens:", window.searchVariants);
})();
</script>

</body>
</html>
