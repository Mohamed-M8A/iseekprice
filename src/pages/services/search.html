        <div class="filter-section">

            <select id="sort-select" class="custom-select">
                <option value="relevance">الأكثر تطابقاً</option>
                <option value="orders_desc">الأكثر مبيعاً</option>
                <option value="price_asc">السعر: من الأقل للأعلى</option>
                <option value="price_desc">السعر: من الأعلى للأقل</option>
                <option value="rating_desc">الأعلى تقييماً</option>
            </select>
        </div>

        <div class="filter-section">
            <div class="filter-title">نطاق السعر</div>
            <div class="price-inputs">
                <input type="number" id="min-price" placeholder="من">
                <input type="number" id="max-price" placeholder="إلى">
            </div>
            <button id="apply-price" class="apply-btn">تطبيق السعر</button>
        </div>

        <div class="filter-section">
            <div class="filter-title">حالة المنتج</div>
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="filter-promo"> يوجد عروض وخصومات

        </div>

        <div class="filter-section">
            <div class="filter-title">تقييم العملاء</div>
            <div class="checkbox-group">
                <label class="checkbox-label">
                    <input type="radio" name="rating" value="4"> <span class="rating-stars">★★★★☆</span> وأعلى
                </label>
                <label class="checkbox-label">
                    <input type="radio" name="rating" value="3"> <span class="rating-stars">★★★☆☆</span> وأعلى
                </label>
                <label class="checkbox-label">
                    <input type="radio" name="rating" value="0" checked> جميع التقييمات
                </label>
            </div>

    </aside>

    <main id="souq-widget-root"></main>

<footer id='footer' itemscope='itemscope' itemtype='https://schema.org/WPFooter'></footer>
    
<script defer src='/public/js/worker.js'></script>  
<script defer src='/public/js/grid.js'></script>  
<script defer src='/public/js/corepress.js'></script>    
<script defer src='/public/js/search.js'></script>

<script id="linguistic-engine">
(async function() {
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get("query")?.trim() || "";
    const heading = document.getElementById("query-heading");

    if (query) {
        heading.innerHTML = `نتائج البحث عن: <span style="color:var(--accent)">"${query}"</span>`;
    } else {
        heading.innerText = "أحدث المنتجات";
    }

    let synonymsDict = {};
    try {
        const response = await fetch('/public/json/key.json?v=');
        if (response.ok) {
            synonymsDict = await response.json();
        }
    } catch (e) {}

    function murmur(str, seed) {
        let h = seed ^ str.length;
        for (let i = 0; i < str.length; i++) {
            h = Math.imul(h ^ str.charCodeAt(i), 0x5bd1e995);
            h = h ^ (h >>> 13);
        }
        return h >>> 0;
    }

    function getVariantsGroups(text) {
        if (!text) return [];
        let groupedVariants = [];
        let words = text.split(/[\s\-]+/).filter(w => w.length > 0);

        const normalize = (t) => {
            return t.replace(/[أإآ]/g, "ا")
                    .replace(/ؤ/g, "و")
                    .replace(/[ئى]/g, "ي")
                    .replace(/ء/g, "")
                    .replace(/[\u064B-\u0652]/g, "")
                    .replace(/ـ/g, "");
        };

        const translit = (t) => {
            const map = {
                'a':'ا','b':'ب','t':'ت','s':'س','j':'ج','h':'ح','x':'خ','d':'د',
                'r':'ر','z':'ز','c':'ص','f':'ف','q':'ق','k':'ك','l':'ل','m':'م',
                'n':'ن','e':'ي','i':'ي','o':'و','u':'و','v':'ف','p':'ب','y':'ي','g':'ج','w':'و'
            };
            return t.split('').map(c => map[c] || c).join('');
        };

        words.forEach(word => {
            let currentSet = new Set();
            let n = normalize(word);
            currentSet.add(n);

            let expandedWords = [word, n];
            
            if (synonymsDict[word]) expandedWords.push(...synonymsDict[word]);
            if (synonymsDict[n]) expandedWords.push(...synonymsDict[n]);
            
            Object.keys(synonymsDict).forEach(k => {
                if (synonymsDict[k].includes(word) || synonymsDict[k].includes(n)) {
                    expandedWords.push(k, ...synonymsDict[k]);
                }
            });

            expandedWords.forEach(w => {
                let cleanW = normalize(w);
                currentSet.add(cleanW);
                if (/[a-zA-Z]/.test(w)) {
                    currentSet.add(w.toLowerCase());
                    currentSet.add(w.toUpperCase());
                    currentSet.add(normalize(translit(w.toLowerCase())));
                }
            });

            let tempArr = Array.from(currentSet);
            tempArr.forEach(v => {
                if (v.startsWith("ال")) currentSet.add(v.substring(2));
                else currentSet.add("ال" + v);
            });

            tempArr = Array.from(currentSet);
            tempArr.forEach(v => {
                if (v.endsWith("ة")) {
                    currentSet.add(v.slice(0, -1) + "ه");
                    currentSet.add(v.slice(0, -1) + "ات");
                }
                if (v.endsWith("ه")) {
                    currentSet.add(v.slice(0, -1) + "ة");
                    currentSet.add(v.slice(0, -1) + "ات");
                }

                const suffixes = /(ات|ون|ين)$/;
                if (v.match(suffixes)) {
                    let stripped = v.replace(suffixes, "");
                    if (stripped.length > 2) currentSet.add(stripped);
                }
            });

            let finalGroup = Array.from(currentSet).filter(v => v.length > 1 || /^[a-zA-Z0-9]+$/.test(v));
            if (finalGroup.length > 0) {
                groupedVariants.push(finalGroup);
            }
        });

        return groupedVariants;
    }

    window.searchVariants = getVariantsGroups(query);
    
    if (window.searchVariants.length > 0) {
        let flatVariants = window.searchVariants.flat();
        let tableData = [];
        
        window.searchVariants.forEach((group, index) => {
            group.forEach(v => {
                tableData.push({ "Group (Index)": index + 1, "Generated Variant": v });
            });
        });

        console.groupCollapsed("%c[Linguistic Engine] Generated Query Tokens", "color: #ff6000; font-size: 13px; font-weight: bold;");
        console.table(tableData);
        console.groupEnd();
    }
})();
</script>

<script id="sidebar-ui-logic">
(function() {
    const trigger = document.getElementById('mobile-filter-trigger');
    const sidebar = document.getElementById('search-sidebar');
    const overlay = document.getElementById('widget-overlay');

    if (trigger && sidebar && overlay) {
        trigger.onclick = function() {
            sidebar.classList.add('active');
            overlay.style.display = 'block';
        };

        overlay.onclick = function() {
            sidebar.classList.remove('active');
            overlay.style.display = 'none';
        };
    }

    function gatherFiltersAndSearch() {
        const minPrice = document.getElementById('min-price').value;
        const maxPrice = document.getElementById('max-price').value;
        
        window.currentFilters = {
            sortBy: document.getElementById('sort-select').value,
            minPrice: minPrice ? parseFloat(minPrice) : null,
            maxPrice: maxPrice ? parseFloat(maxPrice) : null,
            hasPromo: document.getElementById('filter-promo').checked,
            inStock: document.getElementById('filter-instock').checked,
            minRating: parseInt(document.querySelector('input[name="rating"]:checked').value)
        };

        if (window.triggerWorkerSearch && typeof window.triggerWorkerSearch === 'function') {
            window.triggerWorkerSearch();
            if (window.innerWidth <= 992) {
                sidebar.classList.remove('active');
                overlay.style.display = 'none';
            }
        }
    }

    document.getElementById('sort-select').addEventListener('change', gatherFiltersAndSearch);
    document.getElementById('apply-price').addEventListener('click', gatherFiltersAndSearch);
    document.getElementById('filter-promo').addEventListener('change', gatherFiltersAndSearch);
    document.getElementById('filter-instock').addEventListener('change', gatherFiltersAndSearch);
    document.querySelectorAll('input[name="rating"]').forEach(radio => {
        radio.addEventListener('change', gatherFiltersAndSearch);
    });
})();
</script>
