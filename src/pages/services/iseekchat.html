<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ISeekChat Messenger PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;700&display=swap');:root{--orange:#e07a1f;--bg:#080808;--sidebar:#0f0f0f;--card:#141414;--brd:rgba(255,255,255,0.06);--text:#e0e0e0;--trans:all 0.3s ease}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);overflow:hidden;font-family:'Cairo',sans-serif;color:var(--text)}#bg-canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}#app{display:flex;height:100vh;width:100vw;position:relative;z-index:1;background:rgba(8,8,8,0.5);backdrop-filter:blur(2px)}#sidebar{width:280px;background:var(--sidebar);border-left:1px solid var(--brd);display:flex;flex-direction:column;transition:var(--trans)}.new-chat-btn{margin:20px;padding:12px;background:transparent;border:1px solid var(--orange);border-radius:8px;color:var(--orange);text-align:center;cursor:pointer;font-weight:600;transition:var(--trans)}.new-chat-btn:hover{background:rgba(224,122,31,0.1)}#chat-list{flex:1;overflow-y:auto;padding:10px}#chat-list::-webkit-scrollbar{width:3px}#chat-list::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}.chat-item{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:8px;margin-bottom:6px;cursor:pointer;transition:var(--trans);background:transparent;border:1px solid transparent;font-size:13.5px;color:#a0a0a0}.chat-item:hover{background:rgba(255,255,255,0.02);color:var(--text)}.chat-item.active{background:var(--card);border:1px solid var(--brd);color:var(--text)}.chat-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}.del-btn{opacity:0;color:#ef4444;font-size:14px;padding:5px;transition:var(--trans)}.chat-item:hover .del-btn{opacity:0.5}.del-btn:hover{opacity:1!important}#main-chat{flex:1;display:flex;flex-direction:column;position:relative}#chat-header{padding:16px 25px;background:rgba(15,15,15,0.8);backdrop-filter:blur(15px);border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center}.status{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;transition:var(--trans)}.dot{width:8px;height:8px;background:var(--orange);border-radius:50%;box-shadow:0 0 10px rgba(224,122,31,0.5);transition:var(--trans)}.back-link{text-decoration:none;background:transparent;border:1px solid var(--brd);padding:6px 14px;border-radius:6px;color:var(--text);font-size:12px;display:flex;align-items:center;gap:6px;transition:var(--trans)}.back-link svg{width:14px;height:14px;stroke:var(--text);fill:none;transition:var(--trans)}.back-link:hover{background:var(--card);border-color:var(--orange);color:var(--orange)}.back-link:hover svg{stroke:var(--orange)}#chat-box{flex:1;overflow-y:auto;padding:30px;display:flex;flex-direction:column;gap:20px}#chat-box::-webkit-scrollbar{width:4px}#chat-box::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}.msg{display:flex;width:100%}.bubble{padding:14px 20px;border-radius:12px;max-width:75%;font-size:14.5px;line-height:1.7;word-wrap:break-word}.bot .bubble{background:var(--card);border:1px solid var(--brd);border-bottom-right-radius:4px;color:var(--text)}.user .bubble{background:rgba(224,122,31,0.15);border:1px solid rgba(224,122,31,0.3);color:#fff;margin-right:auto;border-bottom-left-radius:4px}#input-area{padding:20px;background:linear-gradient(to top,var(--bg),transparent)}.input-wrap{background:var(--card);border-radius:12px;display:flex;align-items:center;padding:8px 16px;border:1px solid var(--brd);max-width:850px;margin:0 auto;transition:var(--trans)}.input-wrap:focus-within{border-color:rgba(224,122,31,0.5);box-shadow:0 0 20px rgba(0,0,0,0.5)}#user-input{flex:1;background:transparent;border:none;color:#fff;padding:10px;outline:none;font-family:inherit;font-size:14.5px;resize:none;max-height:120px}#send-btn{background:none;border:none;cursor:pointer;padding:6px;opacity:0.6;transition:var(--trans)}#send-btn svg{width:22px;height:22px;stroke:var(--text)}#send-btn:hover{opacity:1}#send-btn:hover svg{stroke:var(--orange)}.modal-ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}.modal-cnt{background:var(--card);padding:25px;border-radius:12px;width:90%;max-width:320px;text-align:center;border:1px solid var(--brd)}.modal-cnt h4{margin:0 0 10px;font-size:16px;font-weight:600}.modal-cnt p{font-size:13px;color:#a0a0a0;margin-bottom:20px}.modal-btns{display:flex;gap:10px;justify-content:center}.m-btn{padding:8px 16px;border-radius:6px;border:1px solid transparent;cursor:pointer;font-weight:600;font-size:13px;transition:var(--trans)}.m-confirm{background:rgba(239,68,68,0.1);color:#ef4444;border-color:rgba(239,68,68,0.3)}.m-confirm:hover{background:#ef4444;color:#fff}.m-cancel{background:transparent;color:var(--text);border-color:var(--brd)}.m-cancel:hover{background:var(--brd)}@media (max-width:768px){#sidebar{position:fixed;right:-100%;height:100%;z-index:500}#sidebar.open{right:0}#input-area{padding:15px}.bubble{max-width:90%}#chat-box{padding:15px}}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">
    <aside id="sidebar">
        <div class="new-chat-btn" onclick="startNewChat()">+ محادثة جديدة</div>
        <div id="chat-list"></div>
    </aside>
    <main id="main-chat">
        <header id="chat-header">
            <div class="status"><div class="dot" id="status-dot"></div><span id="status-text">ISEEKPRICE AI</span></div>
            <a href="https://www.iseekprice.com/" class="back-link">
                <span>العودة للمتجر</span>
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7M2 12h22"/></svg>
            </a>
        </header>
        <div id="chat-box"></div>
        <div id="input-area">
            <div class="input-wrap">
                <textarea id="user-input" placeholder="اكتب سؤالك هنا..." rows="1"></textarea>
                <button onclick="handleSend()" id="send-btn">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </main>
</div>

<div class="modal-ov" id="delModal">
    <div class="modal-cnt">
        <h4>حذف المحادثة؟</h4>
        <p>لا يمكن التراجع عن هذا الإجراء.</p>
        <div class="modal-btns">
            <button class="m-btn m-confirm" id="confirmDel">تأكيد الحذف</button>
            <button class="m-btn m-cancel" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
const BASE_API = "https://api.iseekprice.com/";
const WORKER_URL = 'https://iseek-ai.m7md20051968.workers.dev/';
let db = null;
let currentSessionId = localStorage.getItem('iseek_current_id') || null;
let metaData = null;
let pendingDeleteId = null;

async function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open("ISeekChatDB", 1);
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains("sessions")) d.createObjectStore("sessions", { keyPath: "id" });
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(); };
        req.onerror = (e) => reject(e);
    });
}
async function getAllSessions() {
    return new Promise((resolve) => {
        const tx = db.transaction("sessions", "readonly");
        const req = tx.objectStore("sessions").getAll();
        req.onsuccess = () => resolve(req.result);
    });
}
async function saveSession(session) {
    db.transaction("sessions", "readwrite").objectStore("sessions").put(session);
}
async function deleteSession(id) {
    db.transaction("sessions", "readwrite").objectStore("sessions").delete(id);
}

function murmur(s, seed) {
    let h = seed ^ s.length;
    for (let i = 0; i < s.length; i++) {
        h = Math.imul(h ^ s.charCodeAt(i), 0x5bd1e995);
        h = h ^ (h >>> 13);
    }
    return (h >>> 0);
}

async function loadEngine() {
    try {
        const rMap = await fetch(BASE_API + "General/map.json");
        const map = await rMap.json();
        const rMetaBin = await fetch(BASE_API + `General/meta_${map.meta}.bin`);
        metaData = new Uint8Array(await rMetaBin.arrayBuffer());
    } catch (e) { console.log("Engine Load Skipped/Failed"); }
}

function getMatchedUIDs(q) {
    if (!metaData) return [];
    const tokens = q.toLowerCase().split(/\s+/).filter(t => t.length > 2);
    if (!tokens.length) return [];
    const matched = new Set();
    const view = new DataView(metaData.buffer);
    for (let t of tokens) {
        const hA = murmur(t, 42); const hB = murmur(t, 99);
        const bits = [];
        for (let i = 0; i < 8; i++) bits.push(Math.abs(hA + i * hB) % 2048);
        for (let i = 0; i < metaData.length; i += 264) {
            let hit = true;
            for (let b of bits) { if (!(metaData[i + 8 + Math.floor(b / 8)] & (1 << (b % 8)))) { hit = false; break; } }
            if (hit) matched.add(view.getBigUint64(i, true));
        }
    }
    return Array.from(matched).map(id => id.toString());
}

async function renderChatList() {
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    const sessions = await getAllSessions();
    sessions.reverse().forEach(s => {
        const item = document.createElement('div');
        item.className = `chat-item ${s.id === currentSessionId ? 'active' : ''}`;
        item.onclick = () => loadChat(s.id);
        item.innerHTML = `<span>${s.title}</span><div class="del-btn" onclick="confirmDelete('${s.id}', event)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </div>`;
        list.appendChild(item);
    });
}

function confirmDelete(id, e) {
    e.stopPropagation(); pendingDeleteId = id; document.getElementById('delModal').style.display = 'flex';
}
function closeModal() {
    document.getElementById('delModal').style.display = 'none'; pendingDeleteId = null;
}
document.getElementById('confirmDel').onclick = async () => {
    if (pendingDeleteId) {
        await deleteSession(pendingDeleteId);
        if (currentSessionId === pendingDeleteId) { currentSessionId = null; document.getElementById('chat-box').innerHTML = ''; }
        closeModal(); renderChatList();
    }
};

async function startNewChat() {
    const id = 'chat_' + Date.now();
    await saveSession({ id, title: 'محادثة جديدة', messages: [] });
    currentSessionId = id; localStorage.setItem('iseek_current_id', id);
    renderChatList(); loadChat(id);
}

async function loadChat(id) {
    currentSessionId = id; localStorage.setItem('iseek_current_id', id);
    const box = document.getElementById('chat-box'); box.innerHTML = '';
    const sessions = await getAllSessions();
    const session = sessions.find(s => s.id === id);
    if (session) session.messages.forEach(m => displayMessage(m.text, m.side));
    renderChatList();
}

function displayMessage(text, side) {
    const box = document.getElementById('chat-box');
    const msgDiv = document.createElement('div');
    msgDiv.className = `msg ${side}`;
    msgDiv.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
    box.appendChild(msgDiv);
    box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
}

document.getElementById('user-input').addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase();
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    
    if (val.includes('سعر') || val.includes('بكم') || val.includes('تكلفة')) {
        dot.style.background = '#10b981'; dot.style.boxShadow = '0 0 8px rgba(16,185,129,0.5)'; text.innerText = 'تحليل الأسعار...';
    } else if (val.includes('توصيل') || val.includes('شحن') || val.includes('مكان')) {
        dot.style.background = '#3b82f6'; dot.style.boxShadow = '0 0 8px rgba(59,130,246,0.5)'; text.innerText = 'مراجعة اللوجستيات...';
    } else {
        dot.style.background = ''; dot.style.boxShadow = ''; text.innerText = 'ISEEKPRICE AI';
    }
    
    e.target.style.height = 'auto';
    e.target.style.height = (e.target.scrollHeight < 120 ? e.target.scrollHeight : 120) + 'px';
});

async function getCachedReply(question) {
    const sessions = await getAllSessions();
    for(let s of sessions) {
        for(let i=0; i < s.messages.length - 1; i++) {
            if(s.messages[i].side === 'user' && s.messages[i].text === question && s.messages[i+1].side === 'bot') {
                return s.messages[i+1].text; 
            }
        }
    }
    return null;
}

async function handleSend() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;
    if (!currentSessionId) await startNewChat();

    const sessions = await getAllSessions();
    let session = sessions.find(s => s.id === currentSessionId);
    if (session.messages.length === 0) session.title = text.substring(0, 25);

    displayMessage(text, 'user');
    session.messages.push({ text, side: 'user' });
    input.value = ''; input.style.height = 'auto';

    document.getElementById('status-dot').style.background = ''; 
    document.getElementById('status-text').innerText = 'ISEEKPRICE AI';

    const cachedReply = await getCachedReply(text);
    if(cachedReply) {
        displayMessage(cachedReply, 'bot');
        session.messages.push({ text: cachedReply, side: 'bot' });
        await saveSession(session);
        return;
    }

    const matchedUIDs = getMatchedUIDs(text);
    const loading = document.createElement('div');
    loading.className = 'msg bot';
    loading.innerHTML = '<div class="bubble" style="opacity:0.7">جاري المعالجة...</div>';
    document.getElementById('chat-box').appendChild(loading);

    try {
        const res = await fetch(WORKER_URL, {
            method: 'POST',
            body: JSON.stringify({ prompt: text, userName: 'عميل', uids: matchedUIDs })
        });
        const data = await res.json();
        loading.remove();
        displayMessage(data.reply, 'bot');
        session.messages.push({ text: data.reply, side: 'bot' });
        await saveSession(session);
    } catch (e) {
        loading.innerHTML = '<div class="bubble" style="color:#ef4444; border-color:rgba(239,68,68,0.3)">حدث خطأ في الاتصال.</div>';
    }
}

document.getElementById('user-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let points = [];
let mouse = { x: null, y: null };
const spacing = 30; // المسافة بين النقاط لعمل الشبكة
const hoverRadius = 150; // النطاق المتوسط لإضاءة الماوس

function initCanvas() {
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight;
    points = [];
    // بناء شبكة نقاط منتظمة تملأ الشاشة
    for (let x = 0; x < canvas.width; x += spacing) {
        for (let y = 0; y < canvas.height; y += spacing) {
            points.push({ x, y });
        }
    }
}

window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

function animateCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    points.forEach(p => {
        let dist = 1000;
        if (mouse.x !== null) dist = Math.hypot(mouse.x - p.x, mouse.y - p.y);
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.2, 0, Math.PI * 2); // حجم صغير وثابت جداً
        
        if (dist < hoverRadius) {
            // حساب درجة الإضاءة بناءً على القرب
            let intensity = 1 - (dist / hoverRadius);
            // اللون البرتقالي للعلامة التجارية يضيء بقوة متغيرة
            ctx.fillStyle = `rgba(224, 122, 31, ${Math.max(0.06, intensity)})`;
        } else {
            // اللون الرمادي الخافت الثابت لجميع النقاط البعيدة
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        }
        
        ctx.fill();
    });
    requestAnimationFrame(animateCanvas);
}

window.onload = async () => {
    initCanvas(); animateCanvas(); window.addEventListener('resize', initCanvas);
    await openDB();
    await loadEngine();
    const sessions = await getAllSessions();
    if (sessions.length > 0) {
        renderChatList();
        if (currentSessionId) loadChat(currentSessionId);
    } else {
        await startNewChat();
    }
};
</script>
</body>
</html>
