<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ISeekChat Messenger PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;700&display=swap');:root{--orange:#f38020;--bg:#0f1114;--sidebar:#0a0c0e;--card:#16191d;--brd:rgba(255,255,255,0.06);--text:#e5e7eb}#app{display:flex;height:100vh;width:100vw;font-family:'Cairo',sans-serif;color:var(--text)}#sidebar{width:280px;background:var(--sidebar);border-left:1px solid var(--brd);display:flex;flex-direction:column;transition:transform 0.3s ease-in-out}.new-chat-btn{margin:15px;padding:12px;border:1px dashed var(--orange);border-radius:12px;color:var(--orange);text-align:center;cursor:pointer;font-weight:700;transition:.3s}.new-chat-btn:hover{background:rgba(243,128,32,0.1)}#chat-list{flex:1;overflow-y:auto;padding:10px}#chat-list::-webkit-scrollbar{width:3px}#chat-list::-webkit-scrollbar-thumb{background:var(--brd)}.chat-item{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.2s;font-size:13.5px;background:rgba(255,255,255,0.02)}.chat-item:hover{background:var(--card)}.chat-item.active{background:var(--card);border-right:3px solid var(--orange)}.chat-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}.del-btn{opacity:0.6;color:#ff4757;font-size:15px;padding:5px;transition:.2s}.del-btn:hover{opacity:1;transform:scale(1.1)}#main-chat{flex:1;display:flex;flex-direction:column;position:relative}#chat-header{padding:15px 25px;background:rgba(15,17,20,0.85);backdrop-filter:blur(15px);border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;z-index:100}.status{display:flex;align-items:center;gap:10px;font-weight:700;color:#fff;font-size:14px}.dot{width:8px;height:8px;background:var(--orange);border-radius:50%;box-shadow:0 0 10px var(--orange)}.back-link{display:flex;align-items:center;gap:8px;text-decoration:none;background:rgba(243,128,32,0.1);border:1px solid rgba(243,128,32,0.15);padding:7px 14px;border-radius:10px;transition:.3s}.back-link span{color:var(--orange);font-size:12px;font-weight:700}.back-link svg{width:16px;height:16px;stroke:var(--orange);fill:none}.back-link:hover{background:var(--orange)}.back-link:hover span,.back-link:hover svg{color:#fff;stroke:#fff}#chat-box{flex:1;overflow-y:auto;padding:30px 20px;display:flex;flex-direction:column;gap:22px;background:radial-gradient(circle at 10% 10%,rgba(243,128,32,0.03),transparent)}#chat-box::-webkit-scrollbar{width:4px}#chat-box::-webkit-scrollbar-thumb{background:var(--brd);border-radius:10px}.msg{display:flex;width:100%;animation:f .4s ease}.bubble{padding:14px 18px;border-radius:18px;max-width:85%;font-size:15px;line-height:1.7;word-wrap:break-word;box-shadow:0 4px 15px rgba(0,0,0,0.1)}.bot .bubble{background:var(--card);border:1px solid var(--brd);border-bottom-right-radius:4px}.user .bubble{background:linear-gradient(135deg,var(--orange),#e67616);color:#fff;margin-right:auto;border-bottom-left-radius:4px}#input-area{padding:15px 20px 35px;background:transparent;z-index:10}.input-wrap{background:#1e2228;border-radius:16px;display:flex;align-items:center;padding:8px 15px;border:1px solid var(--brd);box-shadow:0 -10px 30px rgba(0,0,0,0.2);max-width:800px;margin:0 auto}#user-input{flex:1;background:transparent;border:none;color:#fff;padding:10px;outline:none;font-family:inherit;font-size:15px;resize:none;max-height:150px}#send-btn{background:transparent!important;border:none!important;cursor:pointer;padding:10px}#send-btn svg{width:28px;height:28px;stroke:var(--orange);fill:none;transition:.3s}#send-btn:hover svg{transform:scale(1.1);filter:drop-shadow(0 0 8px var(--orange))}/* [3] MODAL & MOBILE */.modal-ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(5px)}.modal-cnt{background:var(--card);padding:25px;border-radius:20px;width:90%;max-width:320px;text-align:center;border:1px solid var(--brd)}.modal-cnt h4{margin:0 0 15px;font-size:18px}.modal-btns{display:flex;gap:10px;justify-content:center}.m-btn{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:700}.m-confirm{background:#ff4757;color:#fff}.m-cancel{background:var(--brd);color:var(--text)}@keyframes f{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@media (max-width:768px){#sidebar{position:fixed;right:-280px;height:100%;z-index:500}#sidebar.open{right:0;transform:translateX(0)}#input-area{padding:10px 15px 25px}.bubble{max-width:90%}}
</style>
</head>
<body>
<div id="app">
    <aside id="sidebar">
        <div class="new-chat-btn" onclick="startNewChat()">+ محادثة جديدة</div>
        <div id="chat-list"></div>
    </aside>
    <main id="main-chat">
        <header id="chat-header">
            <div class="status"><div class="dot"></div><span>ISEEKPRICE AI</span></div>
            <a href="https://www.iseekprice.com/" class="back-link">
                <span>العودة للموقع</span>
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7M2 12h22"/></svg>
            </a>
        </header>
        <div id="chat-box"></div>
        <div id="input-area">
            <div class="input-wrap">
                <textarea id="user-input" placeholder="اكتب سؤالك هنا..." rows="1"></textarea>
                <button onclick="handleSend()" id="send-btn">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </main>
</div>

<div class="modal-ov" id="delModal">
    <div class="modal-cnt">
        <h4>حذف المحادثة؟</h4>
        <p>لا يمكن التراجع عن هذا الإجراء.</p>
        <div class="modal-btns">
            <button class="m-btn m-confirm" id="confirmDel">حذف</button>
            <button class="m-btn m-cancel" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
/* [GLOBAL CONFIG] */
const BASE_API = "https://api.iseekprice.com/";
const WORKER_URL = 'https://iseek-ai.m7md20051968.workers.dev/';
let db = null;
let currentSessionId = localStorage.getItem('iseek_current_id') || null;
let metaData = null;
let pendingDeleteId = null;

/* [INDEXEDDB LOGIC] */
async function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open("ISeekChatDB", 1);
        req.onupgradeneeded = (e) => {
            const d = e.target.result;
            if (!d.objectStoreNames.contains("sessions")) {
                d.createObjectStore("sessions", { keyPath: "id" });
            }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(); };
        req.onerror = (e) => reject(e);
    });
}

async function getAllSessions() {
    return new Promise((resolve) => {
        const tx = db.transaction("sessions", "readonly");
        const store = tx.objectStore("sessions");
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result);
    });
}

async function saveSession(session) {
    const tx = db.transaction("sessions", "readwrite");
    tx.objectStore("sessions").put(session);
}

async function deleteSession(id) {
    const tx = db.transaction("sessions", "readwrite");
    tx.objectStore("sessions").delete(id);
}

/* [HASH LOGIC] */
function murmur(s, seed) {
    let h = seed ^ s.length;
    for (let i = 0; i < s.length; i++) {
        h = Math.imul(h ^ s.charCodeAt(i), 0x5bd1e995);
        h = h ^ (h >>> 13);
    }
    return (h >>> 0);
}

/* [ENGINE INIT] */
async function loadEngine() {
    try {
        const rMap = await fetch(BASE_API + "General/map.json");
        const map = await rMap.json();
        const rMetaBin = await fetch(BASE_API + `General/meta_${map.meta}.bin`);
        metaData = new Uint8Array(await rMetaBin.arrayBuffer());
    } catch (e) {}
}

function getMatchedUIDs(q) {
    if (!metaData) return [];
    const tokens = q.toLowerCase().split(/\s+/).filter(t => t.length > 2);
    if (!tokens.length) return [];
    const matched = new Set();
    const view = new DataView(metaData.buffer);
    for (let t of tokens) {
        const hA = murmur(t, 42); const hB = murmur(t, 99);
        const bits = [];
        for (let i = 0; i < 8; i++) bits.push(Math.abs(hA + i * hB) % 2048);
        for (let i = 0; i < metaData.length; i += 264) {
            let hit = true;
            for (let b of bits) { if (!(metaData[i + 8 + Math.floor(b / 8)] & (1 << (b % 8)))) { hit = false; break; } }
            if (hit) matched.add(view.getBigUint64(i, true));
        }
    }
    return Array.from(matched).map(id => id.toString());
}

/* [UI LOGIC] */
async function renderChatList() {
    const list = document.getElementById('chat-list');
    list.innerHTML = '';
    const sessions = await getAllSessions();
    sessions.reverse().forEach(s => {
        const item = document.createElement('div');
        item.className = `chat-item ${s.id === currentSessionId ? 'active' : ''}`;
        item.onclick = () => loadChat(s.id);
        item.innerHTML = `<span>${s.title}</span><div class="del-btn" onclick="confirmDelete('${s.id}', event)">🗑</div>`;
        list.appendChild(item);
    });
}

function confirmDelete(id, e) {
    e.stopPropagation();
    pendingDeleteId = id;
    document.getElementById('delModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('delModal').style.display = 'none';
    pendingDeleteId = null;
}

document.getElementById('confirmDel').onclick = async () => {
    if (pendingDeleteId) {
        await deleteSession(pendingDeleteId);
        if (currentSessionId === pendingDeleteId) {
            currentSessionId = null;
            document.getElementById('chat-box').innerHTML = '';
        }
        closeModal();
        renderChatList();
    }
};

async function startNewChat() {
    const id = 'chat_' + Date.now();
    const session = { id, title: 'محادثة جديدة', messages: [] };
    await saveSession(session);
    currentSessionId = id;
    localStorage.setItem('iseek_current_id', id);
    renderChatList();
    loadChat(id);
}

async function loadChat(id) {
    currentSessionId = id;
    localStorage.setItem('iseek_current_id', id);
    const box = document.getElementById('chat-box');
    box.innerHTML = '';
    const sessions = await getAllSessions();
    const session = sessions.find(s => s.id === id);
    if (session) {
        session.messages.forEach(m => displayMessage(m.text, m.side));
    }
    renderChatList();
}

function displayMessage(text, side) {
    const box = document.getElementById('chat-box');
    const msgDiv = document.createElement('div');
    msgDiv.className = `msg ${side}`;
    msgDiv.innerHTML = `<div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
    box.appendChild(msgDiv);
    box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
}

async function handleSend() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;
    if (!currentSessionId) await startNewChat();

    const sessions = await getAllSessions();
    let session = sessions.find(s => s.id === currentSessionId);
    if (session.messages.length === 0) session.title = text.substring(0, 25);

    displayMessage(text, 'user');
    session.messages.push({ text, side: 'user' });
    input.value = '';

    const matchedUIDs = getMatchedUIDs(text);
    const loading = document.createElement('div');
    loading.className = 'msg bot';
    loading.innerHTML = '<div class="bubble">جاري تحليل الطلب... 🔍</div>';
    document.getElementById('chat-box').appendChild(loading);

    try {
        const res = await fetch(WORKER_URL, {
            method: 'POST',
            body: JSON.stringify({ prompt: text, userName: 'بطل', uids: matchedUIDs })
        });
        const data = await res.json();
        loading.remove();
        displayMessage(data.reply, 'bot');
        session.messages.push({ text: data.reply, side: 'bot' });
        await saveSession(session);
    } catch (e) {
        loading.innerHTML = '<div class="bubble">حدث خطأ في الاتصال. ✨</div>';
    }
}

/* [INITIALIZATION] */
window.onload = async () => {
    await openDB();
    await loadEngine();
    const sessions = await getAllSessions();
    if (sessions.length > 0) {
        renderChatList();
        if (currentSessionId) loadChat(currentSessionId);
    } else {
        await startNewChat();
    }
};

document.getElementById('user-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
</script>
</body>
</html>
