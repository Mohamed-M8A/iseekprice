<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="https://www.iseekprice.com/public/assets/static/favicon.ico">    
<link href='/public/css/main.css' rel='stylesheet'/> 
<link href='/public/css/product.css' rel='stylesheet'/> 
<script src='/public/js/worker.js'></script>  
<script src='/public/js/grid.js'></script>  
<script defer src='/public/js/corepress.js'></script>    
<script defer src='/public/js/search.js'></script>
<title>كوبونات الخصم</title>
<style>
    .coupon-hero {
        background: linear-gradient(135deg, #d93025 0%, #ff5252 100%);
        color: white;
        padding: 40px 20px;
        text-align: center;
        border-radius: 12px;
        margin: 20px auto;
        max-width: 1200px;
    }
    .coupon-hero h1 { margin: 0; font-size: 26px; }
    .coupon-hero p { margin: 10px 0 0; opacity: 0.9; }
    .product-grid { margin-top: 20px; min-height: 200px; display: flex; flex-wrap: wrap; justify-content: center; }
    .post-card.title-link { border: 2px dashed #d93025 !important; }
    .no-coupons { text-align: center; padding: 60px; font-size: 1.2em; color: #666; width: 100%; }
</style>
</head>
<body>

<header id='header' itemscope='itemscope' itemtype='https://schema.org/WPHeader'>
  <div class='header-main-row'>
    <div class='header-container'>
      <div class='logo' id='logo-wrap'></div>
      <div class='search-container' id='search-wrap'></div>
      <div class='header-actions' id='actions-wrap'></div>
    </div>
  </div>
  <nav id='widget-topbar'></nav>
</header>

<div id='widget-sidebar'></div>
<div id='widget-overlay'></div>   

<main class="main-content">
    <div class="coupon-hero">
        <h1>المنتجات المتوفر لها كوبونات حالياً</h1>
        <p>يتم فحص وتحديث الكوبونات بشكل آلي ومستمر</p>
    </div>
    <div id="souq-widget-root"></div>
</main>

<footer id='footer' itemscope='itemscope' itemtype='https://schema.org/WPFooter'></footer>

<script>
    async function startCouponPage() {
        if (typeof Renderer === 'undefined' || typeof WIDGET_CONFIG === 'undefined' || typeof workerCode === 'undefined') {
            setTimeout(startCouponPage, 100);
            return;
        }

        const root = document.getElementById(WIDGET_CONFIG.ROOT_ID);
        root.innerHTML = `
            <div id="product-posts" class="product-grid"></div>
            <div id="loader" class="loader-container" style="display:flex;justify-content:center;padding:50px;"><div class="spinner"></div></div>
            <button id="load-more" class="load-more-btn" style="display:none;">عرض المزيد</button>`;
        
        const grid = document.getElementById('product-posts');
        const loader = document.getElementById('loader');
        const loadMoreBtn = document.getElementById('load-more');
        const renderer = new Renderer('product-posts', WIDGET_CONFIG.PLACEHOLDER);
        
        let couponProducts = [];
        let globalFeed = new Map();
        let currentIndex = 0;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        const renderItems = () => {
            const batch = couponProducts.slice(currentIndex, currentIndex + 20);
            if (batch.length > 0) {
                renderer.renderBatch(batch, WIDGET_CONFIG.DOMAIN, globalFeed);
                currentIndex += batch.length;
            }
            loadMoreBtn.style.display = (currentIndex < couponProducts.length) ? 'block' : 'none';
        };

        worker.onmessage = (e) => {
            if (e.data.type === 'BATCH') {
                e.data.feed.forEach((v, k) => globalFeed.set(k, v));
                
                const found = e.data.batch.filter(item => {
                    const feed = e.data.feed.get(item.id);
                    return feed && feed.status && feed.status.promo === 1;
                });

                if (found.length > 0) {
                    couponProducts.push(...found);
                    renderItems();
                }
            } else if (e.data.type === 'DONE') {
                loader.style.display = 'none';
                if (couponProducts.length === 0) {
                    grid.innerHTML = '<div class="no-coupons">لا توجد كوبونات متاحة في هذه اللحظة، يرجى المحاولة لاحقاً.</div>';
                }
            }
        };

        loadMoreBtn.onclick = renderItems;

        try {
            const mapRes = await fetch(`${WIDGET_CONFIG.BASE_URL}General/map.json?v=${Date.now()}`);
            const fileMap = await mapRes.json();
            const country = localStorage.getItem("Cntry") || "SA";
            const feedRes = await fetch(`${WIDGET_CONFIG.BASE_URL}${country}/feed_${fileMap.regions[country].feed}.bin`);
            const feedBuf = await feedRes.arrayBuffer();

            worker.postMessage({
                baseUrl: WIDGET_CONFIG.BASE_URL,
                coreFile: `General/core_${fileMap.core}.bin`,
                metaFile: `General/meta_${fileMap.meta}.bin`,
                feedBuffer: feedBuf,
                query: null,
                storeId: null,
                filters: { hasPromo: true }
            });
        } catch (err) {
            loader.style.display = 'none';
        }
    }

    window.addEventListener('DOMContentLoaded', startCouponPage);
</script>
</body>
</html>
