<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="https://www.iseekprice.com/public/assets/static/favicon.ico">    
<link href='/public/css/main.css' rel='stylesheet'/> 
<link href='/public/css/product.css' rel='stylesheet'/> 
<script src='/public/js/worker.js'></script>  
<script src='/public/js/grid.js'></script>  
<script defer src='/public/js/corepress.js'></script>    
<script defer src='/public/js/search.js'></script>
<title>كوبونات الخصم والعروض الحصرية</title>
<style>
  
.coupon-hero{background:linear-gradient(135deg,#d93025 0%,#ff5252 100%);color:#fff;padding:40px 20px;text-align:center;border-radius:12px;margin:20px auto;max-width:1200px}.coupon-hero h1{margin:0;font-size:26px}.coupon-hero p{margin:10px 0 0;opacity:.9}.product-grid{margin-top:20px}.post-card.title-link{border:1px dashed #d93025}
  
</style>
</head>
<body>

<header id='header' itemscope='itemscope' itemtype='https://schema.org/WPHeader'>
  <div class='header-main-row'>
    <div class='header-container'>
      <div class='logo' id='logo-wrap'></div>
      <div class='search-container' id='search-wrap'></div>
      <div class='header-actions' id='actions-wrap'></div>
    </div>
  </div>
  <nav id='widget-topbar'></nav>
</header>

<div id='widget-sidebar'></div>
<div id='widget-overlay'></div>   

<main class="main-content">
    <div class="coupon-hero">
        <h1>كوبونات خصم حصرية</h1>
        <p>تسوق أفضل المنتجات التي تحتوي على عروض ترويجية وأكواد خصم فعالة</p>
    </div>

    <div id="souq-widget-root"></div>
</main>

<footer id='footer' itemscope='itemscope' itemtype='https://schema.org/WPFooter'></footer>

<script>
    async function runCouponEngine() {
        if (typeof Renderer === 'undefined' || typeof WIDGET_CONFIG === 'undefined' || typeof workerCode === 'undefined') {
            setTimeout(runCouponEngine, 100);
            return;
        }

        const root = document.getElementById(WIDGET_CONFIG.ROOT_ID);
        if (!root) return;

        root.innerHTML = `
            <div id="product-posts" class="product-grid"></div>
            <div id="loader" class="loader-container"><div class="spinner"></div></div>
            <button id="load-more" class="load-more-btn" style="display:none;">عرض المزيد</button>`;
        
        const grid = document.getElementById('product-posts');
        const loadMoreBtn = document.getElementById('load-more');
        const loader = document.getElementById('loader');
        const renderer = new Renderer('product-posts', WIDGET_CONFIG.PLACEHOLDER);
        
        let storeData = { core: [], feed: new Map() };
        let currentIndex = 0;
        let isFullyLoaded = false;
        let initialRenderDone = false;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        const renderBatch = () => {
            const size = (currentIndex === 0) ? WIDGET_CONFIG.INITIAL_SIZE : WIDGET_CONFIG.BATCH_SIZE;
            const limit = Math.min(currentIndex + size, storeData.core.length);
            const batch = storeData.core.slice(currentIndex, limit);
            
            if (batch.length > 0) {
                renderer.renderBatch(batch, WIDGET_CONFIG.DOMAIN, storeData.feed);
                currentIndex = limit;
            }
            
            if (isFullyLoaded && currentIndex >= storeData.core.length) {
                loadMoreBtn.style.display = 'none';
            } else if (storeData.core.length > currentIndex) {
                loadMoreBtn.style.display = 'block';
            }
        };

        worker.onmessage = (e) => {
            if (e.data.type === 'BATCH') {
                loader.style.display = 'none';
                e.data.feed.forEach((val, key) => storeData.feed.set(key, val));
                storeData.core.push(...e.data.batch);

                if (!initialRenderDone && storeData.core.length >= WIDGET_CONFIG.INITIAL_SIZE) {
                    renderBatch();
                    initialRenderDone = true;
                }
            } else if (e.data.type === 'DONE') {
                isFullyLoaded = true;
                loader.style.display = 'none';
                if (storeData.core.length === 0) {
                    grid.innerHTML = '<div style="text-align:center;padding:40px;">لا توجد كوبونات متاحة حالياً</div>';
                } else if (!initialRenderDone) {
                    renderBatch();
                }
            }
        };

        loadMoreBtn.onclick = renderBatch;

        try {
            const mapRes = await fetch(`${WIDGET_CONFIG.BASE_URL}General/map.json?v=${Date.now()}`);
            const fileMap = await mapRes.json();
            const country = localStorage.getItem("Cntry") || "SA";
            
            const feedUrl = `${WIDGET_CONFIG.BASE_URL}${country}/feed_${fileMap.regions[country].feed}.bin`;
            const feedRes = await fetch(feedUrl);
            const sharedFeedBuffer = await feedRes.arrayBuffer();

            worker.postMessage({
                baseUrl: WIDGET_CONFIG.BASE_URL,
                coreFile: `General/core_${fileMap.core}.bin`,
                metaFile: `General/meta_${fileMap.meta}.bin`,
                feedBuffer: sharedFeedBuffer,
                query: null,
                storeId: null,
                filters: {
                    hasPromo: true,
                    inStock: true,
                    sortBy: 'orders_desc'
                }
            });

        } catch (err) {
            loader.style.display = 'none';
            grid.innerHTML = '<div class="error-msg">حدث خطأ في تحميل البيانات</div>';
        }
    }

    window.addEventListener('DOMContentLoaded', runCouponEngine);
</script>
</body>
</html>
