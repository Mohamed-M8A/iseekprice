<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href='/public/css/main.css' rel='stylesheet'/> 
<link href='/public/css/product.css' rel='stylesheet'/> 
<script src='/public/js/worker.js'></script>  
<script src='/public/js/grid.js'></script>  
<title>صفحة الكوبونات الحصرية</title>
<style>
    .coupon-badge-header { background:#d93025; color:#fff; padding:20px; text-align:center; border-radius:8px; margin:20px; font-weight:bold; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
    /* إخفاء أي كارت لا يحمل علامة العرض لزيادة التأكيد */
    .post-card { border: 2px solid #eee; transition: 0.3s; }
    .promo-only-card { border: 2px dashed #d93025 !important; }
</style>
</head>
<body>

<div class="coupon-badge-header">
    قسم الكوبونات: يتم عرض المنتجات التي تتوفر لها أكواد خصم فقط
</div>

<div id="souq-widget-root">
    <div id="product-posts" class="product-grid"></div>
    <div id="loader" style="text-align:center; padding:50px;">جاري فحص الكوبونات المتاحة...</div>
</div>

<script>
async function initCouponPage() {
    // التأكد من تحميل المكتبات
    if (typeof Renderer === 'undefined') { setTimeout(initCouponPage, 100); return; }

    const renderer = new Renderer('product-posts', WIDGET_CONFIG.PLACEHOLDER);
    const grid = document.getElementById('product-posts');
    const loader = document.getElementById('loader');

    // إنشاء Worker جديد
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));

    worker.onmessage = (e) => {
        if (e.data.type === 'BATCH') {
            // التصفية الصارمة: فقط المنتجات التي تحمل بت الكوبون (promo === 1)
            const promoProducts = e.data.batch.filter(item => {
                const feedData = e.data.feed.get(item.id);
                return feedData && feedData.status.promo === 1; 
            });

            if (promoProducts.length > 0) {
                loader.style.display = 'none';
                renderer.renderBatch(promoProducts, WIDGET_CONFIG.DOMAIN, e.data.feed);
                
                // إضافة ستايل مميز للمنتجات التي ظهرت
                promoProducts.forEach(p => {
                    const el = document.querySelector(`.UID[style*="none"]`); 
                    // (الريندرر يضع الـ UID في سبان مخفي، يمكن استخدامه لتمييز الكارت)
                });
            }
        } else if (e.data.type === 'DONE') {
            loader.style.display = 'none';
            if (grid.children.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px;">لا توجد كوبونات فعالة في هذه اللحظة.</div>';
            }
        }
    };

    // جلب الخريطة والبيانات للبدء
    const mapRes = await fetch(`${WIDGET_CONFIG.BASE_URL}General/map.json?v=${Date.now()}`);
    const fileMap = await mapRes.json();
    const country = localStorage.getItem("Cntry") || "SA";
    const feedRes = await fetch(`${WIDGET_CONFIG.BASE_URL}${country}/feed_${fileMap.regions[country].feed}.bin`);
    const feedBuffer = await feedRes.arrayBuffer();

    worker.postMessage({
        baseUrl: WIDGET_CONFIG.BASE_URL,
        coreFile: `General/core_${fileMap.core}.bin`,
        metaFile: `General/meta_${fileMap.meta}.bin`,
        feedBuffer: feedBuffer,
        query: null,
        filters: { hasPromo: true } // نرسلها للـ Worker لتقليل المعالجة
    });
}

document.addEventListener('DOMContentLoaded', initCouponPage);
</script>
</body>
</html>
