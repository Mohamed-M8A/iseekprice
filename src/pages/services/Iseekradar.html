<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISeekPrice Radar</title>
    <style>
        :root{--p:#ff4747;--s:#555}body{margin:0;padding:0;width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;background:#f9f9f9;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;direction:rtl}.container{text-align:center;padding:20px}.logo-text{font-size:2.8rem;font-weight:800;background:linear-gradient(45deg,var(--p),#ff8e8e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:15px;animation:pulse 1.5s infinite;letter-spacing:-1px}.status-text{color:var(--s);font-size:1.1rem;font-weight:500}.loader{border:4px solid #eee;border-top:4px solid var(--p);border-radius:50%;width:45px;height:45px;animation:spin 0.8s linear infinite;margin:25px auto}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:.8;transform:scale(0.98)}50%{opacity:1;transform:scale(1)}}
</style>
</head>
<body id="radar-page">
    <div class="container">
        <div class="logo-text">ISeekPrice Radar</div>
        <div class="loader"></div>
        <div class="status-text" id="msg">جاري توجيهك لأفضل سعر...</div>
    </div>
    <script>
        async function startRadar() {
            const params = new URLSearchParams(window.location.search);
            const idx = params.get('idx');
            const startTime = Date.now();
            if (!idx) {
                window.location.href = "https://www.iseekprice.com";
                return;
            }
            try {
                const mapRes = await fetch("https://api.iseekprice.com/General/map.json?v=" + Date.now());
                const map = await mapRes.json();
                const coreFile = `General/core_${map.core}.bin`;
                const recordSize = 276;
                const startByte = parseInt(idx) * recordSize;
                const endByte = startByte + (recordSize - 1);
                const res = await fetch("https://api.iseekprice.com/" + coreFile, {
                    headers: { 'Range': `bytes=${startByte}-${endByte}` }
                });
                if (res.status === 206) {
                    const buffer = await res.arrayBuffer();
                    const decoder = new TextDecoder("utf-8");
                    const path = decoder.decode(new Uint8Array(buffer, 12, 64)).replace(/\0/g, '').trim();
                    const finalUrl = "https://www.iseekprice.com/" + path;
                    const elapsed = Date.now() - startTime;
                    const remaining = Math.max(0, 600 - elapsed);
                    setTimeout(() => {
                        window.location.href = finalUrl;
                    }, remaining);
                } else {
                    throw new Error();
                }
            } catch (e) {
                window.location.href = "https://www.iseekprice.com";
            }
        }
        startRadar();
    </script>
</body>
</html>
