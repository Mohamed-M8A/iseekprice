<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISeekPrice Radar Redirct Page</title>
    <style>

:root{--p:#ff4747;--s:#555}html,body#radar-page{margin:0!important;padding:0!important;width:100%!important;height:100%!important;display:flex!important;justify-content:center!important;align-items:center!important;background:#fff!important;font-family:Tahoma,Geneva,sans-serif!important;overflow:hidden!important;direction:rtl!important}#header,#footer,#widget-topbar,#widget-sidebar,#widget-overlay,.header-container,.nav-bar,.search-container,.header-actions,.dark-mode-toggle,.cart-widget,.footer-container,.footer-row,.footer-links,.footer-social-section,.footer-bottom,.footer-social{display:none!important;visibility:hidden!important;opacity:0!important;pointer-events:none!important}body#radar-page .container{text-align:center!important;all:initial!important;font-family:inherit!important;display:block!important;text-align:center!important}.logo-text{font-size:2.5rem!important;font-weight:700!important;background:linear-gradient(45deg,var(--p),#ff8e8e)!important;-webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;margin-bottom:10px!important;animation:pulse 1.5s infinite!important;display:block!important}.status-text{color:var(--s)!important;font-size:1.1rem!important;display:block!important;direction:rtl!important}.loader{border:4px solid #f3f3f3!important;border-top:4px solid var(--p)!important;border-radius:50%!important;width:40px!important;height:40px!important;animation:spin 1s linear infinite!important;margin:20px auto!important;display:block!important}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}      
      
    </style>
</head>
<body id="radar-page">
    <div class="container">
        <div class="logo-text">ISeekPrice Radar</div>
        <div class="loader"></div>
        <div class="status-text" id="msg">جاري العثور على أفضل سعر...</div>
    </div>

    <script>
        async function startRadar() {
            const params = new URLSearchParams(window.location.search);
            const idx = params.get('idx');
            const uid = params.get('uid');
            const startTime = Date.now();

            if (!idx) {
                window.location.href = "https://www.iseekprice.com";
                return;
            }

            try {
                const mapRes = await fetch("https://api.iseekprice.com/General/map.json?v=" + Date.now());
                const map = await mapRes.json();
                const coreFile = `General/core_${map.core}.bin`;

                const startByte = parseInt(idx) * 442;
                const endByte = startByte + 441;

                const res = await fetch("https://api.iseekprice.com/" + coreFile, {
                    headers: { 'Range': `bytes=${startByte}-${endByte}` }
                });

                if (res.status === 206) {
                    const buffer = await res.arrayBuffer();
                    const decoder = new TextDecoder("utf-8");
                    const path = decoder.decode(new Uint8Array(buffer, 12, 80)).replace(/\0/g, '').trim();
                    const finalUrl = "https://www.iseekprice.com/" + path;

                    const elapsed = Date.now() - startTime;
                    const remaining = Math.max(0, 500 - elapsed);

                    setTimeout(() => {
                        window.location.href = finalUrl;
                    }, remaining);
                } else { throw new Error(); }

            } catch (e) {
                
            }
        }
        startRadar();
    </script>
</body>
</html>
