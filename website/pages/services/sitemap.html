<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خريطة الموقع</title>
<style>
  
.sitemap-container{font-family:system-ui,-apple-system,sans-serif;margin:20px;direction:rtl}.sitemap-item{border:1px solid #ddd;border-radius:12px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.05)}.sitemap-header{background:#000;color:#fff;padding:18px;font-weight:800;text-align:center;font-size:20px}.sitemap-posts{background:#fff}.sitemap-posts ul{list-style:none;padding:0;margin:0}.sitemap-posts li{border-bottom:1px solid #eee;transition:0.2s}.sitemap-posts li:last-child{border-bottom:none}.sitemap-posts li:hover{background:#fcfcfc}.sitemap-posts a{text-decoration:none;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;gap:15px}.post-title{color:#007bff;font-size:14px;font-weight:600;line-height:1.5;text-align:right}.post-date{color:#999;font-size:12px;white-space:nowrap;font-family:monospace}#sitemap-loader{text-align:center;padding:30px;color:#666;font-size:14px}
  
</style>
</head>
<body>

<div class="sitemap-container" id="sitemap">
  <div class="sitemap-item">
    <div class="sitemap-header" id="smap-title">جاري فحص خريطة الموقع...</div>
    <div id="sitemap-loader">يتم الآن تجميع الروابط وتواريخ النشر...</div>
    <div class="sitemap-posts" id="smap-list" style="display:none;">
      <ul id="posts-ul"></ul>
    </div>
  </div>
</div>

<script>
  
(function() {
    const postsUl = document.getElementById("posts-ul");
    const smapList = document.getElementById("smap-list");
    const smapTitle = document.getElementById("smap-title");
    const loader = document.getElementById("sitemap-loader");
    let allEntries = [];
    const maxResults = 150;
    const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit' };
    const df = new Intl.DateTimeFormat('ar-EG', dateOptions);

    async function fetchAllPosts(startIndex) {
        const feedUrl = `/feeds/posts/summary?alt=json&start-index=${startIndex}&max-results=${maxResults}`;
        try {
            const response = await fetch(feedUrl);
            const data = await response.json();
            const entries = data.feed.entry || [];
            allEntries = allEntries.concat(entries);
            if (entries.length === maxResults) {
                await fetchAllPosts(startIndex + maxResults);
            } else {
                renderSitemap();
            }
        } catch (error) {
            renderSitemap(); 
        }
    }

    function renderSitemap() {
        if (allEntries.length === 0) {
            loader.innerHTML = "لا توجد مقالات منشورة.";
            return;
        }
        let html = "";
        allEntries.forEach(entry => {
            const title = entry.title.$t;
            const link = entry.link.find(l => l.rel === "alternate").href;
            const publishedDate = new Date(entry.published.$t);
            const formattedDate = df.format(publishedDate);
            html += `<li><a href="${link}" title="${title}"><span class="post-title">${title}</span><span class="post-date">${formattedDate}</span></a></li>`;
        });
        postsUl.innerHTML = html;
        loader.style.display = "none";
        smapList.style.display = "block";
        smapTitle.innerText = `أرشيف المنتجات الكامل (${allEntries.length})`;
    }
    fetchAllPosts(1);
})();
  
</script>

</body>
</html>
